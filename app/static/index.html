<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>twio-cairn</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 0 auto; padding: 1rem; }
    nav { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; }
    nav button { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0.25rem 0; }
    nav button.active { font-weight: bold; border-bottom: 2px solid black; }
    section { display: none; }
    section.active { display: block; }
    #type-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; }
    #type-grid button { padding: 0.75rem; font-size: 1rem; cursor: pointer; }
    dialog { width: min(400px, 90vw); padding: 1.5rem; border: 1px solid #ccc; }
    dialog::backdrop { background: rgba(0,0,0,0.3); }
    fieldset { border: none; padding: 0; margin: 0 0 1rem 0; display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.9rem; font-weight: bold; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 0.4rem; font-size: 1rem; }
    .entry { border-bottom: 1px solid #eee; padding: 0.5rem 0; }
    .entry time { font-size: 0.8rem; color: #666; }
    .actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    #feed-filter { margin-bottom: 1rem; }
    #login-section input { margin-bottom: 0.5rem; }
    .error { color: red; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-section">
    <h1>twio-cairn</h1>
    <form id="login-form">
      <fieldset>
        <label for="api-key-input">API Key</label>
        <input type="password" id="api-key-input" required autocomplete="current-password">
      </fieldset>
      <button type="submit">Login</button>
      <p class="error" id="login-error" hidden></p>
    </form>
  </div>

  <!-- Main App -->
  <div id="app" hidden>
    <nav>
      <button class="active" data-section="log">Log</button>
      <button data-section="feed">Feed</button>
      <button data-section="types">Types</button>
      <button id="logout-btn" style="margin-left:auto">Logout</button>
    </nav>

    <!-- Log -->
    <section id="log" class="active">
      <div id="type-grid"></div>
      <p id="no-types-msg" hidden>No types yet. Add one in the Types tab.</p>
    </section>

    <!-- Feed -->
    <section id="feed">
      <select id="feed-filter">
        <option value="">All types</option>
      </select>
      <div id="entries-list"></div>
      <div id="feed-pagination" class="actions">
        <button id="feed-prev" disabled>← Prev</button>
        <button id="feed-next">Next →</button>
      </div>
    </section>

    <!-- Types -->
    <section id="types">
      <details open>
        <summary>Add new type</summary>
        <form id="type-form" style="margin-top:0.75rem">
          <fieldset>
            <label for="type-name">Name</label>
            <input type="text" id="type-name" required placeholder="e.g. beer">

            <label for="type-unit">Unit</label>
            <input type="text" id="type-unit" required placeholder="e.g. count">

            <label for="type-value-type">Value type</label>
            <select id="type-value-type">
              <option value="integer">Integer</option>
              <option value="float">Float</option>
            </select>

            <label for="type-default">Default value (optional)</label>
            <input type="number" id="type-default" step="any" placeholder="e.g. 1">

            <label for="type-icon">Icon (optional)</label>
            <input type="text" id="type-icon" placeholder="e.g. 🍺">
          </fieldset>
          <button type="submit">Add type</button>
          <p class="error" id="type-error" hidden></p>
        </form>
      </details>

      <hr>
      <div id="types-list"></div>
    </section>
  </div>

  <!-- Entry Dialog -->
  <dialog id="entry-dialog">
    <form id="entry-form" method="dialog">
      <h2 id="entry-dialog-title"></h2>
      <fieldset>
        <label for="entry-value">Value (<span id="entry-unit-label"></span>)</label>
        <input type="number" id="entry-value" step="any" required>

        <label for="entry-notes">Notes (optional)</label>
        <textarea id="entry-notes" rows="2"></textarea>
      </fieldset>
      <div class="actions">
        <button type="submit">Save</button>
        <button type="button" id="entry-cancel">Cancel</button>
      </div>
      <p class="error" id="entry-error" hidden></p>
    </form>
  </dialog>

<script>
  const $ = id => document.getElementById(id);

  // --- State ---
  let currentTypeId = null;
  let feedOffset = 0;
  const FEED_LIMIT = 20;

  // --- API ---
  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: body ? { "Content-Type": "application/json" } : {},
      body: body ? JSON.stringify(body) : undefined,
      credentials: "include",
    });
    if (res.status === 401) { showLogin(); return null; }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || res.statusText);
    }
    return res.status === 204 ? null : res.json();
  }

  // --- Auth ---
  async function login(key) {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ api_key: key }),
      credentials: "include",
    });
    if (!res.ok) throw new Error("Invalid API key");
  }

  function showLogin() {
    $("login-section").hidden = false;
    $("app").hidden = true;
  }

  function showApp() {
    $("login-section").hidden = true;
    $("app").hidden = false;
  }

  $("login-form").addEventListener("submit", async e => {
    e.preventDefault();
    const err = $("login-error");
    err.hidden = true;
    try {
      await login($("api-key-input").value);
      showApp();
      loadAll();
    } catch (e) {
      err.textContent = e.message;
      err.hidden = false;
    }
  });

  $("logout-btn").addEventListener("click", async () => {
    await api("POST", "/logout");
    showLogin();
  });

  // --- Navigation ---
  document.querySelectorAll("nav button[data-section]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
      document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
      btn.classList.add("active");
      $(btn.dataset.section).classList.add("active");
      if (btn.dataset.section === "feed") loadFeed();
      if (btn.dataset.section === "types") loadTypes();
    });
  });

  // --- Types ---
  async function loadTypes() {
    const types = await api("GET", "/types");
    if (!types) return;
    renderTypeGrid(types);
    renderTypesList(types);
    renderFeedFilter(types);
  }

  function renderTypeGrid(types) {
    const grid = $("type-grid");
    const msg = $("no-types-msg");
    grid.innerHTML = "";
    if (types.length === 0) { msg.hidden = false; return; }
    msg.hidden = true;
    types.forEach(t => {
      const btn = document.createElement("button");
      btn.textContent = `${t.icon ?? ""} ${t.name}`.trim();
      btn.addEventListener("click", () => openEntryDialog(t));
      grid.appendChild(btn);
    });
  }

  function renderTypesList(types) {
    const list = $("types-list");
    list.innerHTML = "";
    if (types.length === 0) { list.textContent = "No types yet."; return; }
    types.forEach(t => {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <strong>${t.icon ?? ""} ${t.name}</strong> — ${t.unit} (${t.value_type})
        ${t.default_value != null ? `<br><small>Default: ${t.default_value}</small>` : ""}
      `;
      const del = document.createElement("button");
      del.textContent = "Delete";
      del.addEventListener("click", async () => {
        if (!confirm(`Delete type "${t.name}"?`)) return;
        try {
          await api("DELETE", `/types/${t.id}`);
          loadTypes();
        } catch (e) { alert(e.message); }
      });
      div.appendChild(del);
      list.appendChild(div);
    });
  }

  function renderFeedFilter(types) {
    const sel = $("feed-filter");
    const current = sel.value;
    sel.innerHTML = `<option value="">All types</option>`;
    types.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t.id;
      opt.textContent = `${t.icon ?? ""} ${t.name}`.trim();
      sel.appendChild(opt);
    });
    sel.value = current;
  }

  $("type-form").addEventListener("submit", async e => {
    e.preventDefault();
    const err = $("type-error");
    err.hidden = true;
    try {
      await api("POST", "/types", {
        name: $("type-name").value.trim(),
        unit: $("type-unit").value.trim(),
        value_type: $("type-value-type").value,
        default_value: $("type-default").value ? parseFloat($("type-default").value) : null,
        icon: $("type-icon").value.trim() || null,
      });
      $("type-form").reset();
      loadTypes();
    } catch (e) {
      err.textContent = e.message;
      err.hidden = false;
    }
  });

  // --- Entry Dialog ---
  function openEntryDialog(type) {
    currentTypeId = type.id;
    $("entry-dialog-title").textContent = `${type.icon ?? ""} ${type.name}`.trim();
    $("entry-unit-label").textContent = type.unit;
    const input = $("entry-value");
    input.step = type.value_type === "float" ? "any" : "1";
    input.value = type.default_value ?? "";
    $("entry-notes").value = "";
    $("entry-error").hidden = true;
    $("entry-dialog").showModal();
    input.focus();
    input.select();
  }

  $("entry-cancel").addEventListener("click", () => $("entry-dialog").close());

  $("entry-form").addEventListener("submit", async e => {
    e.preventDefault();
    const err = $("entry-error");
    err.hidden = true;
    try {
      await api("POST", "/entries", {
        type_id: currentTypeId,
        value: parseFloat($("entry-value").value),
        notes: $("entry-notes").value.trim() || null,
      });
      $("entry-dialog").close();
    } catch (e) {
      err.textContent = e.message;
      err.hidden = false;
    }
  });

  // --- Feed ---
  async function loadFeed() {
    const typeId = $("feed-filter").value;
    const params = new URLSearchParams({ limit: FEED_LIMIT, offset: feedOffset });
    if (typeId) params.set("type_id", typeId);
    const entries = await api("GET", `/entries?${params}`);
    if (!entries) return;
    const list = $("entries-list");
    list.innerHTML = "";
    if (entries.length === 0 && feedOffset === 0) {
      list.textContent = "No entries yet.";
    }
    entries.forEach(en => {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <strong>${en.type_name}</strong>: ${en.value} ${en.type_unit}
        ${en.notes ? `<br><small>${en.notes}</small>` : ""}
        <br><time datetime="${en.created_at}">${new Date(en.created_at).toLocaleString()}</time>
      `;
      const del = document.createElement("button");
      del.textContent = "Delete";
      del.addEventListener("click", async () => {
        if (!confirm("Delete this entry?")) return;
        await api("DELETE", `/entries/${en.id}`);
        loadFeed();
      });
      div.appendChild(del);
      list.appendChild(div);
    });
    $("feed-prev").disabled = feedOffset === 0;
    $("feed-next").disabled = entries.length < FEED_LIMIT;
  }

  $("feed-filter").addEventListener("change", () => { feedOffset = 0; loadFeed(); });
  $("feed-prev").addEventListener("click", () => { feedOffset = Math.max(0, feedOffset - FEED_LIMIT); loadFeed(); });
  $("feed-next").addEventListener("click", () => { feedOffset += FEED_LIMIT; loadFeed(); });

  // --- Init ---
  async function loadAll() {
    await loadTypes();
  }

  // Check session on load
  api("GET", "/types").then(types => {
    if (types) { showApp(); renderTypeGrid(types); renderFeedFilter(types); }
    else showLogin();
  });
</script>
</body>
</html>
